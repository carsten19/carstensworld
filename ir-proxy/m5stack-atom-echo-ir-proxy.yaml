---
substitutions:
  name: m5stack-atom-echo-1621e0
  friendly_name: M5Stack Atom Echo IR Proxy

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

ota:
  - platform: esphome
    id: ota_esphome

api:
  encryption:
    key: !secret encryption_key
  actions:
    - action: send_pronto
      variables:
        code: string
      then:
        - remote_transmitter.transmit_pronto:
            transmitter_id: ir_transmitter
            data: !lambda "return code;"
    - action: send_nec
      variables:
        address: int
        command: int
        repeats: int
      then:
        - remote_transmitter.transmit_nec:
            transmitter_id: ir_transmitter
            address: !lambda "return address;"
            command: !lambda "return command;"
            repeat:
              times: !lambda "return repeats;"
              wait_time: 40ms
    - action: send_panasonic
      variables:
        address: int
        command: int
        repeats: int
      then:
        - remote_transmitter.transmit_panasonic:
            transmitter_id: ir_transmitter
            address: !lambda "return address;"
            command: !lambda "return command;"
            repeat:
              times: !lambda "return repeats;"
              wait_time: 40ms
    - action: send_sony
      variables:
        code: int
        nbits: int
        repeats: int
      then:
        - remote_transmitter.transmit_sony:
            transmitter_id: ir_transmitter
            data: !lambda "return code;"
            nbits: !lambda "return nbits;"
            repeat:
              times: !lambda "return repeats;"
              wait_time: 40ms

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

network:
  enable_ipv6: true

remote_receiver:
  pin:
    number: GPIO32
    inverted: true
  dump: all
  id: ir_receiver
  tolerance: 50%

remote_transmitter:
  id: ir_transmitter
  pin:
    number: GPIO26
    inverted: true
  carrier_duty_percent: 50%
  non_blocking: true

# Infrared platform - creates infrared entities.
infrared:
  - platform: ir_rf_proxy
    name: IR Transmitter
    remote_transmitter_id: ir_transmitter
  - platform: ir_rf_proxy
    name: IR Receiver
    remote_receiver_id: ir_receiver
    receiver_frequency: 38kHz

light:
  - platform: esp32_rmt_led_strip
    id: atom_led
    pin: GPIO27
    num_leds: 1
    chipset: SK6812
    rgb_order: GRB
